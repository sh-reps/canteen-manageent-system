<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
        <div class="login-container">
                <h2>Canteen Management System</h2>
                <input type="text" id="admission_no" placeholder="Admission Number (e.g. 2024CS101)">
                <input type="password" id="password" placeholder="Password">
                <button onclick="login()">Login</button>
                <p id="error-message" style="color: red;"></p>
                <a href="/forgot-password" style="display: block; margin-top: 15px; color: #2ecc71; text-decoration: none; font-size: 0.9em; text-align: center;">Forgot Password?</a>
        </div>
        <script src="/js/login.js"></script>
        <script src="/js/clock.js"></script>
    </body>
</html>
