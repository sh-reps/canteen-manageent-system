<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
    
        <div class="login-container auth-card">
                <h2>Canteen Management System</h2>
            <p class="auth-helper">Sign in to manage your bookings, orders, and canteen activity.</p>
                <input type="text" id="admission_no" placeholder="Admission Number (e.g. 2024CS101)">
                <input type="password" id="password" placeholder="Password">
                <button onclick="login()">Login</button>
            <p id="error-message" class="auth-message auth-error"></p>
            <a href="/forgot-password" class="auth-link">Forgot Password?</a>
        </div>
        <script src="/js/login.js"></script>
        
    </body>
</html>
