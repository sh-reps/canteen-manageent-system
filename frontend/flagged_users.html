<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flagged Users - Admin</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-layout">

    <div class="system-clock-bar">
        <div id="system-clock" class="system-clock"></div>
    </div>

    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>Canteen Admin</h2>
        </div>
        <ul>
            <li id="nav-orders" onclick="location.href='/admin'" class="nav-item">
                <i class="fas fa-receipt"></i> Orders
            </li>
            <li id="nav-users" onclick="location.href='/admin'" class="nav-item">
                <i class="fas fa-users"></i> Users
            </li>
            <li class="nav-item nav-group-title" onclick="location.href='/flagged_users'">
                <i class="fas fa-shield-alt"></i> Flags & Behavior
            </li>
            <li id="nav-flagged-users" class="nav-item nav-sub-item active">
                <i class="fas fa-flag"></i> Flagged Users
            </li>
            <li id="nav-menu" onclick="location.href='/admin'" class="nav-item">
                <i class="fas fa-utensils"></i> Menu
            </li>
            <li id="nav-stock" onclick="location.href='/admin'" class="nav-item">
                <i class="fas fa-boxes"></i> Daily Stock
            </li>
            <li id="nav-clock" onclick="location.href='/admin'" class="nav-item">
                <i class="fas fa-bug"></i> Debug
            </li>
            <li id="nav-holidays" onclick="location.href='/admin'" class="nav-item">
                <i class="fas fa-calendar-times"></i> Holidays
            </li>
        </ul>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="localStorage.clear(); location.href='/'">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <main class="content">
        <section id="section-flagged-users" class="admin-section">
            <div class="section-header">
                <h2>Flagged Users Management</h2>
                <button class="btn-action" onclick="location.reload()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Admission No.</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Flags</th>
                        <th>Deposit %</th>
                        <th>Last Flagged</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="flagged-users-table">
                    <!-- User data will be inserted here by JavaScript -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="/js/clock.js"></script>
    <script src="/js/flagged_users.js"></script>
</body>
</html>
