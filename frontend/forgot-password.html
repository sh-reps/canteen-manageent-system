<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
       

    <div class="auth-card">
        <h2>Reset Password</h2>
        <p class="auth-helper">Enter your admission number. We'll send a reset link to your registered email.</p>
        
        <input type="text" id="admission_no" placeholder="Admission Number" required>
        <button onclick="requestReset()">Send Reset Link</button>
        
        <p id="msg" class="auth-message"></p>
        <a href="/" class="auth-link">&larr; Back to Login</a>
    </div>

    <script>
        async function requestReset() {
            const admission_no = document.getElementById('admission_no').value;
            const msgEl = document.getElementById('msg');
            msgEl.innerText = "Sending...";
            msgEl.style.color = "#aaa";
            
            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admission_no })
                });
                const data = await response.json();
                msgEl.innerText = data.message || data.detail;
                msgEl.style.color = response.ok ? "#2ecc71" : "#e74c3c";
            } catch (err) {
                msgEl.innerText = "Network error. Please try again later.";
                msgEl.style.color = "#e74c3c";
            }
        }
    </script>
   
</body>
</html>
