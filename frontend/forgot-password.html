<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 8px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff; }
        button { width: 95%; padding: 12px; background: #2ecc71; color: #121212; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        button:hover { background: #27ae60; }
        a { color: #2ecc71; text-decoration: none; font-size: 0.9em; display: inline-block; margin-top: 20px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
       

    <div class="card">
        <h2>Reset Password</h2>
        <p style="font-size: 0.9em; color: #aaa; margin-bottom: 20px;">Enter your admission number. We'll send a reset link to your registered email.</p>
        
        <input type="text" id="admission_no" placeholder="Admission Number" required>
        <button onclick="requestReset()">Send Reset Link</button>
        
        <p id="msg" style="margin-top: 15px; font-size: 0.95em;"></p>
        <a href="/">&larr; Back to Login</a>
    </div>

    <script>
        async function requestReset() {
            const admission_no = document.getElementById('admission_no').value;
            const msgEl = document.getElementById('msg');
            msgEl.innerText = "Sending...";
            msgEl.style.color = "#aaa";
            
            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admission_no })
                });
                const data = await response.json();
                msgEl.innerText = data.message || data.detail;
                msgEl.style.color = response.ok ? "#2ecc71" : "#e74c3c";
            } catch (err) {
                msgEl.innerText = "Network error. Please try again later.";
                msgEl.style.color = "#e74c3c";
            }
        }
    </script>
   
</body>
</html>
