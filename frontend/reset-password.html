<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
    

    <div class="auth-card">
        <h2>Create New Password</h2>
        <p class="auth-helper">Enter your new password below.</p>
        
        <input type="password" id="new_pass" placeholder="New Password" required>
        <input type="password" id="confirm_pass" placeholder="Confirm Password" required>
        <button onclick="resetPassword()">Update Password</button>
        
        <p id="msg" class="auth-message"></p>
        <a href="/" class="auth-link">&larr; Go to Login</a>
    </div>

    <script>
        async function resetPassword() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const new_pass = document.getElementById('new_pass').value;
            const confirm_pass = document.getElementById('confirm_pass').value;
            const msgEl = document.getElementById('msg');
            
            if (!token) return msgEl.innerText = "Invalid or missing token!", msgEl.style.color = "#e74c3c";
            if (new_pass !== confirm_pass) return msgEl.innerText = "Passwords do not match!", msgEl.style.color = "#e74c3c";
            
            msgEl.innerText = "Updating...";
            msgEl.style.color = "#aaa";
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: new_pass })
                });
                const data = await response.json();
                msgEl.innerText = data.message || data.detail;
                msgEl.style.color = response.ok ? "#2ecc71" : "#e74c3c";
            } catch (err) {
                msgEl.innerText = "Network error. Please try again later.", msgEl.style.color = "#e74c3c";
            }
        }
    </script>
</body>
</html>
